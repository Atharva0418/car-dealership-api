server.port = ${PORT:3000}

spring.config.import=optional:file:.env[.properties]

spring.application.name=car-dealership-api
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
jwt.refresh-token-expiration-seconds=${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
# Refresh tokens are stateless JWTs. Existing deployed refresh_tokens tables should be dropped with a follow-up migration.
